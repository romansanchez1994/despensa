[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Aumentar límite de body para imágenes de tickets (por defecto 1MB, subimos a 6MB)
[functions."claude"]
  included_files = []

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
